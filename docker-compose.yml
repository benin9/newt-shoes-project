version: '3.8'

services:
  # 1. DATABASE (Pengganti Laragon)

  db:
    image: mysql:8.0
    # ... (environment dan ports yang sudah ada)
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    container_name: mysql_db_newt
    restart: always
    environment:
      MYSQL_DATABASE: newt_shoes
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # 2. BACKEND (Express Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: express_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=newt_shoes
      - JWT_SECRET=your_jwt_secret_key_here
      - FRONTEND_URL=http://frontend:3000
      - NODE_ENV=development
    restart: on-failure 
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  # 3. FRONTEND (Tampilan web kamu tetap di port 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs_frontend
    ports:
      - "8080:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    depends_on:
      - backend
      
volumes:
  db_data: